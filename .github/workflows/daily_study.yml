name: Daily RAS Study Plan

on:
  schedule:
    - cron: '59 11 * * 0-5'  # 05:29 PM IST (Sunday to Friday Plan - No Sat)
    - cron: '43 7 * * *'     # 01:13 PM IST (Evening Reminder)
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable fonts-indic fonts-noto-core
      
      - name: Morning Run (Plan)
        if: github.event.schedule == '59 11 * * 0-5' || github.event_name == 'workflow_dispatch'
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python automation_main.py

      - name: Evening Run (Reminder)
        if: github.event.schedule == '43 7 * * *'
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python reminder_mailer.py
