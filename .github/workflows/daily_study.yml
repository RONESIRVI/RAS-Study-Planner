name: Daily RAS Study Plan

on:
  schedule:
    - cron: '15 9 * * 0-5'  # 02:45 PM IST (Sunday to Friday Plan - No Sat)
    - cron: '7 9 * * *'     # 02:37 PM IST (Evening Reminder)
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Select what to run manually:'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - reminder

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable fonts-indic fonts-noto-core
      
      - name: Morning Run (Plan)
        if: github.event.schedule == '15 9 * * 0-5' || (github.event_name == 'workflow_dispatch' && inputs.run_type == 'plan')
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python automation_main.py

      - name: Evening Run (Reminder)
        if: github.event.schedule == '7 9 * * *' || (github.event_name == 'workflow_dispatch' && inputs.run_type == 'reminder')
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python reminder_mailer.py
