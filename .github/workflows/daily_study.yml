name: Daily RAS Study Plan

on:
  schedule:
    - cron: '31 18 * * *'  # 12:01 AM IST (Morning Plan)
    - cron: '0 23 * * *'   # 04:30 AM IST (Late Morning Plan)
    - cron: '30 9 * * *'  # 03:00 PM IST (Evening Reminder)
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable fonts-indic fonts-noto-core
      
      - name: Morning Run (Plan)
        if: github.event.schedule == '31 18 * * *' || github.event.schedule == '0 23 * * *' || github.event_name == 'workflow_dispatch'
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python automation_main.py

      - name: Evening Run (Reminder)
        if: github.event.schedule == '30 9 * * *'
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python reminder_mailer.py
